name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Matching your local toolchain

      - name: Install Tools
        run: |
          go install github.com/PuerkitoBio/goquery
          go install github.com/riking/staticcheck@latest
          # Note: If using golangci-lint, it's better to use their official action

      - name: Run Checks
        run: make checks

      - name: Run Tests
        run: make test

      - name: Build
        run: make build
