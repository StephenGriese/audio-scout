name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@master

      - name: Run Checks
        run: make checks

      - name: Run Tests
        run: make test

      - name: Build Binary
        run: make build